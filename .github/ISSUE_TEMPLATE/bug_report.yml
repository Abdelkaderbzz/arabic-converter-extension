name: Bug report
description: Report something that is broken or not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include as much detail as possible so we can reproduce and fix it quickly.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - Chrome extension
        - Web app (Next.js)
        - Landing page
        - Privacy policy page
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
      placeholder: When I click Convert with Arabizi input, the extension shows an error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue
      placeholder: |
        1. Open the extension popup
        2. Enter `3aslema`
        3. Click Convert
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Extension version (from `chrome://extensions`) or web app commit/branch
      placeholder: "1.1.0"

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Edge
        - Brave
        - Firefox
        - Safari
        - Other
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Drag and drop images or paste links here
      placeholder: Optional but very helpful

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues to avoid duplicates
          required: true
        - label: I am willing to help test a fix if needed
          required: false
